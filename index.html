<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Study Spots Australia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: system-ui, Arial, sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 40px 16px;
    }
    .box {
      max-width: 1000px;
      margin: auto;
      background: white;
      padding: 32px;
      border-radius: 16px;
    }
    .card {
      margin-top: 24px;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,.12);
    }
    img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }
    .content {
      padding: 16px;
    }
  </style>
</head>

<body>
<div class="box">
  <h1>Study Spots Australia</h1>
  <p>Quiet places to study across Australia</p>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=1200&q=80">
    <div class="content">
      <strong>📍 State Library Victoria</strong><br>
      Melbourne CBD<br>
      Very Quiet · Power · Stable WiFi<br>
      Best for: Deep focus
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1541339907198-e08756dedf3f?w=1200&q=80">
    <div class="content">
      <strong>📍 Library at The Dock</strong><br>
      Docklands<br>
      Very Quiet · Power · Stable WiFi<br>
      Best for: Exams
    </div>
  </div>

</div>
</body>
</html>
