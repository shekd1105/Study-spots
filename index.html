<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Study Spots Australia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    background: #eef2f7;
    margin: 0;
    padding: 40px 16px;
    color: #111;
  }

  .container {
    max-width: 960px;
    margin: auto;
    background: #ffffff;
    padding: 32px;
    border-radius: 18px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
  }

  h1 {
    margin-top: 0;
    margin-bottom: 6px;
  }

  p {
    margin-top: 0;
    color: #4b5563;
  }

  input {
    width: 100%;
    padding: 14px 16px;
    margin: 20px 0 32px;
    font-size: 16px;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    outline: none;
  }

  input:focus {
    border-color: #6366f1;
  }

  .card {
    background: #ffffff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 10px 24px rgba(0,0,0,0.10);
    margin-bottom: 32px;
  }

  .card img {
    width: 100%;
    height: 240px;
    object-fit: cover;
    display: block;
  }

  .content {
    padding: 20px 22px 24px;
  }

  .suburb {
    font-size: 14px;
    color: #6b7280;
    margin-bottom: 14px;
  }

  .badges {
    margin-bottom: 14px;
  }

  .badges span {
    display: inline-block;
    background: #f3f4f6;
    padding: 8px 12px;
    border-radius: 12px;
    margin: 6px 6px 0 0;
    font-size: 14px;
    font-weight: 500;
  }

  strong {
    color: #111;
  }
</style>
</head>
<body>

<div class="container">
  <h1>Study Spots</h1>
  <p>Quiet, reliable libraries in Melbourne for focused study and deep work.</p>

  <input id="search" placeholder="Search by suburb or library…" />

  <div id="spots"></div>
</div>

<script>
  const spots = [
    {
      name: "State Library Victoria",
      suburb: "Melbourne CBD",
      image: "https://images.unsplash.com/photo-1507842217343-583bb7270b66",
      quiet: "Very Quiet",
      power: "Yes",
      wifi: "Stable",
      bestFor: "Deep focus, reading"
    },
    {
      name: "Kathleen Syme Library",
      suburb: "Carlton",
      image: "https://images.unsplash.com/photo-1524995997946-a1c2e315a42f",
      quiet: "Quiet",
      power: "Yes",
      wifi: "Stable",
      bestFor: "Laptop work"
    },
    {
      name: "Library at The Dock",
      suburb: "Docklands",
      image: "https://images.unsplash.com/photo-1541339907198-e08756dedf3f?w=1200&q=80",
      quiet: "Very Quiet",
      power: "Yes",
      wifi: "Stable",
      bestFor: "Long study sessions"
    },
    {
      name: "Tarneit Library",
      suburb: "Tarneit",
      image: "https://images.unsplash.com/photo-1519682337058-a94d519337bc",
      quiet: "Quiet",
      power: "Yes",
      wifi: "Stable",
      bestFor: "Study, exams, focused work"
    }
  ];

  const container = document.getElementById("spots");
  const search = document.getElementById("search");

  function render(list) {
    container.innerHTML = "";
    list.forEach(s => {
      container.innerHTML += `
        <div class="card">
          <img src="${s.image}"<div class="content">
            <h3>${s.name}</h3>
            <div class="suburb">${s.suburb}</div>
            <div class="badges">
              <span>🔇 ${s.quiet}</span>
              <span>🔌 Power: ${s.power}</span>
              <span>📶 Wi‑Fi: ${s.wifi}</span>
            </div>
            <p><strong>Best for:</strong> ${s.bestFor}</p>
          </div>
        </div>
      `;
    });
  }

  search.addEventListener("input", () => {
    const q = search.value.toLowerCase();
    render(spots.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.suburb.toLowerCase().includes(q)
    ));
  });

  render(spots);
</script>

</body>
</html>
