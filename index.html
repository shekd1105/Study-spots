<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Study Spots Australia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Find quiet places to study, work and focus in Melbourne. Libraries and study-friendly cafes." />

  <style>
    body {
      font-family: system-ui, -apple-system, Arial, sans-serif;
      background: #eef2f7;
      margin: 0;
      padding: 48px 16px;
      color: #111;
    }

    .container {
      max-width: 1100px;
      margin: auto;
    }

    .main {
      background: #ffffff;
      padding: 40px 32px 48px;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      margin: 0;
      font-size: 38px;
    }

    header p {
      margin: 12px 0 28px;
      color: #4b5563;
      font-size: 18px;
    }

    .search {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }

    .search input {
      width: 100%;
      max-width: 520px;
      padding: 14px 16px;
      font-size: 16px;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      outline: none;
    }

    .filters {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }

    .filters button {
      border: 1px solid #d1d5db;
      background: #f9fafb;
      border-radius: 999px;
      padding: 10px 18px;
      cursor: pointer;
      font-size: 14px;
    }

    .filters button.active {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 32px;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 12px 28px rgba(0,0,0,0.12);
      transition: transform 0.15s ease;
    }

    .card:hover {
      transform: translateY(-3px);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    .card .content {
      padding: 22px 22px 26px;
    }

    .card h3 {
      margin: 0;
      font-size: 20px;
    }

    .suburb {
      font-size: 14px;
      color: #6b7280;
      margin: 8px 0 14px;
    }

    .badges span {
      display: inline-block;
      background: #f3f4f6;
      padding: 8px 12px;
      border-radius: 12px;
      margin: 6px 6px 0 0;
      font-size: 14px;
      font-weight: 500;
    }

    footer {
      margin-top: 72px;
      text-align: center;
      font-size: 14px;
      color: #6b7280;
    }

    footer a {
      color: #4f46e5;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="main">

    <!-- HEADER -->
    <header>
      <h1>Study Spots Australia</h1>
      <p>Find quiet places to study, work and focus</p>

      <div class="search">
        <input id="search" placeholder="Search suburb or library" />
      </div>

      <div class="filters">
        <button class="active" onclick="setFilter('all', this)">All</button>
        <button onclick="setFilter('library', this)">Libraries</button>
        <button onclick="setFilter('cafe', this)">Cafes</button>
      </div>
    </header>

    <!-- CARDS -->
    <div class="grid" id="spots"></div>

    <!-- FOOTER -->
    <footer>
      <p>
        Coming soon:
       
<a href="/melbourne-study-spots.html">Melbourne Study Spots Guide</a>
``

      </p>
    </footer>

  </div>
</div>

<script>
  const spots = [
    {
      type: "library",
      name: "State Library Victoria",
      suburb: "Melbourne CBD",
      image: "https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=1200&q=80",
      tags: "🔇 Very Quiet | 🔌 Power | 📶 WiFi Stable",
      bestFor: "Deep focus"
    },
    {
      type: "library",
      name: "Library at The Dock",
      suburb: "Docklands",
      image: "https://images.unsplash.com/photo-1541339907198-e08756dedf3f?w=1200&q=80",
      tags: "🔇 Very Quiet | 🔌 Power | 📶 WiFi Stable",
      bestFor: "Long study sessions"
    },
    {
      type: "library",
      name: "Tarneit Library",
      suburb: "Tarneit",
      image: "https://images.unsplash.com/photo-1519682337058-a94d519337bc?w=1200&q=80",
      tags: "🔇 Quiet | 🔌 Power | 📶 WiFi Stable",
      bestFor: "Exams & study"
    },
    {
      type: "cafe",
      name: "Seven Seeds Coffee Roasters",
      suburb: "Carlton",
      image: "https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=1200&q=80",
      tags: "☕ Quiet mornings | 💻 Laptops OK",
      bestFor: "Short study sessions"
    }
  ];

  let currentFilter = "all";
  const grid = document.getElementById("spots");
  const search = document.getElementById("search");

  function render() {
    const q = search.value.toLowerCase();
    grid.innerHTML = spots
      .filter(s => currentFilter === "all" || s.type === currentFilter)
      .filter(s => s.name.toLowerCase().includes(q) || s.suburb.toLowerCase().includes(q))
      .map(s => `
        <div class="card">
          <img      <div class="content">
            <h3>📍 ${s.name}</h3>
            <div class="suburb">${s.suburb}</div>
            <div class="badges"><span>${s.tags}</span></div>
            <p><strong>Best for:</strong> ${s.bestFor}</p>
          </div>
        </div>
      `).join("");
  }

  function setFilter(type, btn) {
    currentFilter = type;
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  search.addEventListener("input", render);
  render();
</script>

</body>
</html>
